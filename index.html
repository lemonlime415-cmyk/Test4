<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>คุณคือแมวแบบไหน 🐱</title>

<link href="https://fonts.googleapis.com/css2?family=Kanit&display=swap" rel="stylesheet">

<style>
body {
  font-family: 'Kanit', sans-serif;
  background: linear-gradient(135deg, #ffd6e0, #fff6f9);
  text-align: center;
}

.container {
  max-width: 520px;
  margin: 50px auto;
}

.card {
  background: white;
  padding: 25px;
  border-radius: 20px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.1);
}

button {
  display: block;
  width: 100%;
  margin: 8px 0;
  padding: 14px;
  border: none;
  background: #ff7aa2;
  color: white;
  border-radius: 12px;
  cursor: pointer;
  transition: 0.2s;
}

button:hover {
  background: #ff4d88;
  transform: scale(1.02);
}

.progress {
  height: 8px;
  background: #eee;
  border-radius: 10px;
  margin-bottom: 15px;
}

.progress-bar {
  height: 100%;
  width: 0%;
  background: #ff7aa2;
}
</style>
</head>

<body>

<div class="container">
  <div class="card">
    <div class="progress"><div class="progress-bar" id="bar"></div></div>
    <h2 id="q">กดเริ่ม</h2>
    <div id="choices"></div>
    <button onclick="start()" id="startBtn">เริ่ม</button>
  </div>
</div>

<script>
const questions = [
{
q: "วันหยุดในฝันของคุณคือ?",
choices: [
{ text: "นอนทั้งวัน 😴", type: "lazy" },
{ text: "ออกไปเที่ยว 🌈", type: "playful" },
{ text: "อยู่บ้านเงียบ ๆ 🧘", type: "introvert" }
]
},
{
q: "ถ้ามีคนทักคุณก่อน?",
choices: [
{ text: "ดีใจมาก 💕", type: "cute" },
{ text: "ตอบบ้างไม่ตอบบ้าง 😶", type: "introvert" },
{ text: "ชวนคุยยาว 🔥", type: "playful" }
]
},
{
q: "สไตล์การกิน?",
choices: [
{ text: "อะไรก็ได้ 🐟", type: "lazy" },
{ text: "เลือกของดีเท่านั้น 🍣", type: "boss" },
{ text: "กินไปเล่นไป 😆", type: "playful" }
]
},
{
q: "เพื่อนมองคุณว่า?",
choices: [
{ text: "น่ารัก 🥺", type: "cute" },
{ text: "ลึกลับ 🤫", type: "introvert" },
{ text: "พลังเยอะ ⚡", type: "playful" }
]
},
{
q: "คุณจัดการปัญหาแบบไหน?",
choices: [
{ text: "หนี 😅", type: "lazy" },
{ text: "สู้เต็มที่ 💪", type: "boss" },
{ text: "คิดเงียบ ๆ 🧠", type: "introvert" }
]
}
];

let score = {
lazy:0,
playful:0,
introvert:0,
cute:0,
boss:0
};

let current = 0;

function start() {
document.getElementById("startBtn").style.display = "none";
showQ();
}

function showQ() {
updateBar();
let q = questions[current];
document.getElementById("q").innerText = q.q;

let html = "";
q.choices.forEach(c=>{
html += `<button onclick="choose('${c.type}')">${c.text}</button>`;
});
document.getElementById("choices").innerHTML = html;
}

function choose(type) {
score[type]++;
current++;

if(current < questions.length){
showQ();
}else{
result();
}
}

function updateBar(){
document.getElementById("bar").style.width =
(current / questions.length * 100) + "%";
}

function result(){
let r = Object.keys(score).reduce((a,b)=>score[a]>score[b]?a:b);

const map = {
lazy:"🐱 แมวขี้เกียจ ชิล ๆ ใช้ชีวิตสบาย",
playful:"🐱 แมวสายซน พลังงานล้นโลก",
introvert:"🐱 แมวอินโทรเวิร์ต โลกส่วนตัวสูง",
cute:"🐱 แมวขี้อ้อน ใครก็แพ้",
boss:"🐱 แมวสายบอส เดินที่ไหนก็มีออร่า"
};

document.getElementById("q").innerText = map[r];
document.getElementById("choices").innerHTML =
`<button onclick="location.reload()">เล่นอีกครั้ง</button>`;
updateBar();
}
</script>

</body>
</html>
